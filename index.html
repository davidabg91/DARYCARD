<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Surrogate-Control" content="no-store" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Дари" />
    <link rel="apple-touch-icon" href="pwa-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Дари Комерс</title>
    
    

    <style>
      body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
      #root { min-height: 100vh; }
      .initial-loader {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 1rem;
      }
      .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(255,82,82,0.1);
        border-top: 3px solid #ff5252; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="letter-spacing: 2px; font-size: 10px; opacity: 0.5;">DARY COMMERCE</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
